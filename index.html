<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonix Pro - Next-Gen Property Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- ================= ROLE SELECTION OVERLAY ================= -->
    <div id="roleModal" class="fixed inset-0 z-50 flex items-center justify-center bg-[#070a12] px-4">
        <div class="max-w-md w-full text-center space-y-8">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">ZONIX PRO</h1>
                <p class="text-gray-400 mt-2 text-sm">Premium Property Marketplace with Multi-Angle Previews & Direct Visit Pipeline</p>
            </div>
            
            <div class="space-y-4">
                <button onclick="setRole('tenant')" class="w-full glass hover:border-blue-500/50 p-6 rounded-2xl flex items-center space-x-4 transition-all duration-300 text-left group hover:scale-[1.02]">
                    <div class="p-4 bg-blue-500/10 rounded-xl text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-all">
                        <i class="fa-solid fa-key text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white">I want to Rent a Property</h3>
                        <p class="text-xs text-gray-400 mt-0.5">Explore BHK layouts, inspect maintenance costs & lock visit slots.</p>
                    </div>
                </button>

                <button onclick="setRole('owner')" class="w-full glass hover:border-emerald-500/50 p-6 rounded-2xl flex items-center space-x-4 transition-all duration-300 text-left group hover:scale-[1.02]">
                    <div class="p-4 bg-emerald-500/10 rounded-xl text-emerald-400 group-hover:bg-emerald-500 group-hover:text-white transition-all">
                        <i class="fa-solid fa-building-user text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white">I am a Property Owner/Agent</h3>
                        <p class="text-xs text-gray-400 mt-0.5">List configuration details, upload kitchen/bath galleries & track leads.</p>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- ================= NAVIGATION ================= -->
    <nav class="sticky top-0 z-40 glass border-b border-gray-800/60 px-4 py-3 mb-6">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="resetApp()">
                <span class="text-2xl font-black tracking-wider text-blue-500">ZONIX PRO</span>
                <span id="roleBadge" class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider"></span>
            </div>
            <button onclick="toggleRole()" class="text-xs font-semibold bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-xl flex items-center space-x-1.5 transition">
                <i class="fa-solid fa-shuffle text-blue-400"></i>
                <span id="switchBtnText">Switch Mode</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        
        <!-- ================= TENANT/CUSTOMER HUB ================= -->
        <div id="tenantView" class="hidden space-y-8">
            <div class="space-y-3">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" id="searchBox" oninput="filterRooms()" placeholder="Search by locality, sectors, landmarks, or society names..." class="w-full glass pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition text-sm text-gray-200">
                </div>
                <div class="flex items-center space-x-2 overflow-x-auto hide-scrollbar py-1 text-xs">
                    <button onclick="filterType('all')" class="chip-btn px-4 py-2 rounded-full glass border-blue-500/30 text-blue-400 font-medium whitespace-nowrap" id="chip-all">All Properties</button>
                    <button onclick="filterType('1 BHK')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-1BHK">🏡 1 BHK</button>
                    <button onclick="filterType('2 BHK')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-2BHK">🏢 2 BHK</button>
                    <button onclick="filterType('3 BHK')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-3BHK">🏰 3 BHK</button>
                </div>
            </div>

            <!-- Grid -->
            <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

            <!-- Tracker -->
            <div class="pt-4 border-t border-gray-800/60">
                <h3 class="text-sm font-bold text-gray-400 mb-3 flex items-center space-x-2">
                    <i class="fa-solid fa-route text-blue-400 animate-pulse"></i>
                    <span>Your Active Site-Visit Pipeline Tracker</span>
                </h3>
                <div id="studentStatusTrack" class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs"></div>
            </div>
        </div>

        <!-- ================= OWNER HUB ================= -->
        <div id="ownerView" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Advanced Listing Form -->
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-5 rounded-2xl border-emerald-500/10 space-y-4">
                    <h2 id="formHeaderTitle" class="text-lg font-bold text-white flex items-center space-x-2">
                        <i class="fa-solid fa-circle-plus text-emerald-400"></i>
                        <span>Property Dashboard Manager</span>
                    </h2>
                    <form id="listingForm" onsubmit="handleFormSubmit(event)" class="space-y-3 text-xs">
                        <input type="hidden" id="formEditId" value="">
                        <div>
                            <label class="block text-gray-400 mb-1">Property Name / Society</label>
                            <input type="text" id="formTitle" required placeholder="e.g., Greens Apartment, Sector 5" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-200 focus:outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-gray-400 mb-1">Monthly Rent (₹)</label>
                                <input type="number" id="formRent" required class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-200 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-400 mb-1">Maintenance Fee</label>
                                <select id="formMaintenance" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-300 focus:outline-none">
                                    <option value="Incl. Maintenance">Included in Rent</option>
                                    <option value="+ ₹1,500 Maint.">+ ₹1,500 Extra</option>
                                    <option value="+ ₹3,000 Maint.">+ ₹3,000 Extra</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-gray-400 mb-1">Configuration Type</label>
                                <select id="formType" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-300 focus:outline-none">
                                    <option value="1 BHK">1 BHK</option>
                                    <option value="2 BHK">2 BHK</option>
                                    <option value="3 BHK">3 BHK</option>
                                    <option value="Commercial">Commercial Shop/Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-400 mb-1">Locality Landmark</label>
                                <input type="text" id="formLandmark" required placeholder="e.g., Near Metro Station / Main Market" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-200 focus:outline-none">
                            </div>
                        </div>
                        
                        <!-- MULTI-IMAGE ALBUM SPECIFICATION BLOCK -->
                        <div class="p-3 bg-gray-900/40 rounded-xl border border-gray-800 space-y-2">
                            <span class="block text-[11px] font-bold text-blue-400 uppercase tracking-wider mb-1"><i class="fa-solid fa-images mr-1"></i>Multi-Angle Visual Gallery</span>
                            <div>
                                <label class="text-[10px] text-gray-400">1. Main Hall / Living Room Image URL</label>
                                <input type="url" id="formImgRoom" required placeholder="Paste room layout image URL" class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 mt-0.5 text-gray-300 text-[11px]">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400">2. Bathroom Cleanliness & Fittings URL</label>
                                <input type="url" id="formImgBath" required placeholder="Paste bathroom image URL" class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 mt-0.5 text-gray-300 text-[11px]">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-400">3. Kitchen & Dining Setup URL</label>
                                <input type="url" id="formImgKitchen" required placeholder="Paste kitchen image URL" class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 mt-0.5 text-gray-300 text-[11px]">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-gray-400 mb-1">Available Visit Hours</label>
                                <select id="formTimeSlot" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-300 focus:outline-none">
                                    <option value="11:00 AM - 04:00 PM">11:00 AM - 04:00 PM</option>
                                    <option value="05:00 PM - 08:00 PM">05:00 PM - 08:00 PM</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-400 mb-1">Contact Mobile Number</label>
                                <input type="tel" id="formPhone" required placeholder="10 digits" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-200 focus:outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">Google Maps Direction Link</label>
                            <input type="url" id="formMap" required placeholder="https://maps.google.com/..." class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 text-gray-200 focus:outline-none">
                        </div>
                        <button type="submit" id="formSubmitBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition">Publish Listing live</button>
                    </form>
                </div>
            </div>

            <!-- Pipeline Management Panels -->
            <div class="lg:col-span-2 space-y-6">
                <div>
                    <h2 class="text-base font-bold text-white flex items-center space-x-2 mb-3">
                        <i class="fa-solid fa-bell-concierge text-amber-400"></i>
                        <span>📥 Live Visit Appointment Requests</span>
                    </h2>
                    <div id="incomingRequestGrid" class="space-y-2"></div>
                </div>
                <div>
                    <h2 class="text-base font-bold text-white flex items-center space-x-2 mb-3">
                        <i class="fa-solid fa-folder-open text-blue-400"></i>
                        <span>Your Active Properties Sandbox</span>
                    </h2>
                    <div id="ownerGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- ================= APPOINTMENT MODAL ================= -->
    <div id="bookingModal" class="fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm hidden">
        <div class="glass w-full max-w-md rounded-2xl p-6 border border-gray-800 space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-calendar-days mr-1.5 text-blue-400"></i>Schedule Physical Site Visit</h3>
                <button onclick="closeBookingModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="modalBookingForm" onsubmit="executeBookingRequest(event)" class="space-y-3 text-xs">
                <input type="hidden" id="modalRoomId" value="">
                <div>
                    <label class="block text-gray-400 mb-1">Your Full Name</label>
                    <input type="text" id="tenantName" required class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-gray-200 outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Your Contact Number</label>
                    <input type="tel" id="tenantPhone" required class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-gray-200 outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Preferred Visit Slot</label>
                    <select id="tenantTimeSelection" required class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-gray-300 outline-none"></select>
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition">Book Direct Inspection Slot</button>
            </form>
        </div>
    </div>

    <!-- ================= JAVASCRIPT ENGINE ================= -->
    <script>
        // High quality general real-estate preview placeholders
        let roomsData = [
            { 
                id: 1, 
                title: "Skyline Height Luxury Family Apartment", 
                rent: 18500, 
                maintenance: "Incl. Maintenance",
                type: "2 BHK", 
                landmark: "500m from Central Metro Station",
                timeSlot: "11:00 AM - 04:00 PM", 
                images: {
                    room: "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=600&q=80",
                    bath: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=600&q=80",
                    kitchen: "https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&w=600&q=80"
                },
                mapUrl: "https://maps.google.com", 
                phone: "9876543210" 
            }
        ];

        let bookingRequests = [
            { id: 101, roomId: 1, roomTitle: "Skyline Height Luxury Apartment", tenantName: "Rajesh Kumar", tenantPhone: "9988776655", slot: "11:00 AM - 04:00 PM", status: "pending" }
        ];

        let currentRole = null;
        let selectedFilter = 'all';

        function setRole(role) {
            currentRole = role;
            document.getElementById('roleModal').classList.add('hidden');
            const badge = document.getElementById('roleBadge');
            const switchBtnText = document.getElementById('switchBtnText');
            
            if(role === 'tenant') {
                badge.innerText = "Tenant View";
                badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold bg-blue-500/10 text-blue-400 border border-blue-500/20";
                switchBtnText.innerText = "Switch to Owner Dashboard";
                document.getElementById('tenantView').classList.remove('hidden');
                document.getElementById('ownerView').classList.add('hidden');
                renderTenantGrid();
                renderStudentTracker();
            } else {
                badge.innerText = "Owner Portal";
                badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                switchBtnText.innerText = "Switch to Tenant View";
                document.getElementById('tenantView').classList.add('hidden');
                document.getElementById('ownerView').classList.remove('hidden');
                renderOwnerGrid();
                renderOwnerRequests();
            }
        }

        function toggleRole() { setRole(currentRole === 'tenant' ? 'owner' : 'tenant'); }
        function resetApp() { document.getElementById('roleModal').classList.remove('hidden'); }

        // Multi Angle Image switcher system
        function switchCardPhoto(roomId, category) {
            const room = roomsData.find(r => r.id === roomId);
            if(!room) return;
            document.getElementById(`display-img-${roomId}`).src = room.images[category];
            
            document.querySelectorAll(`.btn-group-${roomId} button`).forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white');
                btn.classList.add('bg-black/60', 'text-gray-400');
            });
            event.target.classList.replace('bg-black/60', 'bg-blue-500');
            event.target.classList.replace('text-gray-400', 'text-white');
        }

        function renderTenantGrid(filteredList = roomsData) {
            const container = document.getElementById('propertyGrid');
            container.innerHTML = '';
            filteredList.forEach(room => {
                container.innerHTML += `
                    <div class="glass rounded-2xl overflow-hidden border-gray-800/80 group">
                        <div class="relative h-48 w-full bg-gray-900">
                            <img id="display-img-${room.id}" src="${room.images.room}" class="w-full h-full object-cover transition duration-300">
