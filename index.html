<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonix Pro - Next-Gen Property Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 glass border-b border-gray-800/60 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <span class="text-xl font-black text-blue-500 cursor-pointer" onclick="showPage('tenantView')">ZONIX PRO</span>
            <div class="flex items-center space-x-4 text-xs font-bold text-gray-400">
                <button onclick="showPage('tenantView')">Explore</button>
                <button onclick="showPage('pipelineView')">My Bookings</button>
                <button onclick="showPage('profileView')">Profile</button>
                <button onclick="showPage('ownerView')" class="text-emerald-400">Owner Portal</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Tenant View -->
        <div id="tenantView" class="page-section">
            <input type="text" id="searchBox" oninput="filterRooms()" placeholder="Search properties..." class="w-full glass p-4 rounded-xl mb-6">
            <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- Pipeline View -->
        <div id="pipelineView" class="page-section hidden">
            <h2 class="text-lg font-bold mb-4">My Visit Pipeline</h2>
            <div id="studentStatusTrack" class="space-y-3"></div>
        </div>

        <!-- Profile View -->
        <div id="profileView" class="page-section hidden max-w-sm mx-auto glass p-6 rounded-2xl">
            <h2 class="text-lg font-bold mb-4">My Profile</h2>
            <input type="text" id="savedName" placeholder="Full Name" class="w-full bg-gray-900 p-3 rounded-xl mb-3 border border-gray-800">
            <input type="tel" id="savedPhone" placeholder="Mobile" class="w-full bg-gray-900 p-3 rounded-xl mb-4 border border-gray-800">
            <button onclick="saveProfile()" class="w-full bg-blue-500 py-3 rounded-xl font-bold">Save Details</button>
        </div>

        <!-- Owner View -->
        <div id="ownerView" class="page-section hidden">
            <h2 class="text-xl font-bold mb-4">Owner Dashboard</h2>
            <!-- Include your existing listing form here -->
        </div>
    </main>

    <script>
        // --- Core Data & State ---
        let roomsData = [{ id: 1, title: "Luxury Apt", rent: 18500, type: "2 BHK", images: {room: "", bath: "", kitchen: ""}, timeSlot: "11:00 AM - 04:00 PM" }];
        let bookingRequests = [];

        // --- Page Navigation ---
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(div => div.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }

        // --- Profile Logic ---
        function saveProfile() {
            const profile = { name: document.getElementById('savedName').value, phone: document.getElementById('savedPhone').value };
            localStorage.setItem('tenantProfile', JSON.stringify(profile));
            alert("Profile Saved!");
        }

        window.onload = () => {
            const saved = localStorage.getItem('tenantProfile');
            if(saved) {
                const p = JSON.parse(saved);
                document.getElementById('savedName').value = p.name || '';
                document.getElementById('savedPhone').value = p.phone || '';
            }
        };

        // --- Booking Logic (Updated for Auto-fill) ---
        function executeBookingRequest(roomId) {
            const saved = JSON.parse(localStorage.getItem('tenantProfile'));
            if(!saved || !saved.name) {
                alert("Please fill your Profile details first!");
                showPage('profileView');
                return;
            }
            
            bookingRequests.unshift({
                id: Date.now(),
                tenantName: saved.name,
                tenantPhone: saved.phone,
                status: "pending"
            });
            
            alert("🚀 Booking Confirmed!");
            showPage('pipelineView');
            renderStudentTracker();
        }
    </script>
</body>
</html>
