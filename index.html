<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonix - Smart Student Housing</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-btn { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- ================= ROLE SELECTION OVERLAY ================= -->
    <div id="roleModal" class="fixed inset-0 z-50 flex items-center justify-center bg-[#070a12] px-4">
        <div class="max-w-md w-full text-center space-y-8">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">ZONIX</h1>
                <p class="text-gray-400 mt-2 text-sm">Find your perfect study bubble or list your space instantly.</p>
            </div>
            
            <div class="space-y-4">
                <button onclick="setRole('tenant')" class="w-full glass hover:border-blue-500/50 p-6 rounded-2xl flex items-center space-x-4 transition-all duration-300 text-left group hover:scale-[1.02]">
                    <div class="p-4 bg-blue-500/10 rounded-xl text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-all">
                        <i class="fa-solid fa-graduation-cap text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white">I want to Rent a Room</h3>
                        <p class="text-xs text-gray-400 mt-0.5">Search PGs, hostels, and rooms near you.</p>
                    </div>
                </button>

                <button onclick="setRole('owner')" class="w-full glass hover:border-emerald-500/50 p-6 rounded-2xl flex items-center space-x-4 transition-all duration-300 text-left group hover:scale-[1.02]">
                    <div class="p-4 bg-emerald-500/10 rounded-xl text-emerald-400 group-hover:bg-emerald-500 group-hover:text-white transition-all">
                        <i class="fa-solid fa-house-user text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white">I want to List Property</h3>
                        <p class="text-xs text-gray-400 mt-0.5">Post rooms, manage entries, get leads.</p>
                    </div>
                </button>
            </div>
            <p class="text-xs text-gray-600">Free dashboard portal built for student communities.</p>
        </div>
    </div>

    <!-- ================= MAIN LAYOUT ================= -->
    <!-- Top Navbar -->
    <nav class="sticky top-0 z-40 glass border-b border-gray-800/60 px-4 py-3 mb-6">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="resetApp()">
                <span class="text-2xl font-black tracking-wider text-blue-500">ZONIX</span>
                <span id="roleBadge" class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider"></span>
            </div>
            <button onclick="toggleRole()" class="text-xs font-semibold bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-xl flex items-center space-x-1.5 transition">
                <i class="fa-solid fa-shuffle text-blue-400"></i>
                <span id="switchBtnText">Switch Mode</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        
        <!-- ================= TENANT MODE INTERFACE ================= -->
        <div id="tenantView" class="hidden space-y-6">
            <!-- Search & Filter Controls -->
            <div class="space-y-3">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" id="searchBox" oninput="filterRooms()" placeholder="Search by area, landmark or facility..." class="w-full glass pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition text-sm text-gray-200 placeholder-gray-500">
                </div>
                <!-- Interactive Filter Chips -->
                <div class="flex items-center space-x-2 overflow-x-auto hide-scrollbar py-1 text-xs">
                    <button onclick="filterType('all')" class="chip-btn px-4 py-2 rounded-full glass border-blue-500/30 text-blue-400 font-medium whitespace-nowrap" id="chip-all">All Hubs</button>
                    <button onclick="filterType('Single')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-Single">🟢 Single Room</button>
                    <button onclick="filterType('Library')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-Library">📚 Library Attached</button>
                    <button onclick="filterType('Food')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-Food">🍲 Mess Included</button>
                </div>
            </div>

            <!-- Dynamic Property Grid -->
            <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Rendered dynamically by script -->
            </div>
        </div>

        <!-- ================= OWNER MODE INTERFACE ================= -->
        <div id="ownerView" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Add Listing Form -->
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-6 rounded-2xl border-emerald-500/10 space-y-4">
                    <div>
                        <h2 class="text-xl font-bold text-white flex items-center space-x-2">
                            <i class="fa-solid fa-circle-plus text-emerald-400"></i>
                            <span>List New Space</span>
                        </h2>
                        <p class="text-xs text-gray-400 mt-0.5">Fill detail to add property layout instantly.</p>
                    </div>

                    <form id="listingForm" onsubmit="handleFormSubmit(event)" class="space-y-3 text-xs">
                        <div>
                            <label class="block text-gray-400 mb-1 font-medium">Property Name / Location Title</label>
                            <input type="text" id="formTitle" required placeholder="e.g., Durga PG Single Room" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-gray-400 mb-1 font-medium">Monthly Rent (₹)</label>
                                <input type="number" id="formRent" required placeholder="e.g., 4500" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                            </div>
                            <div>
                                <label class="block text-gray-400 mb-1 font-medium">Property Type</label>
                                <select id="formType" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-300">
                                    <option value="Single">Single Room</option>
                                    <option value="Library">Library Attached</option>
                                    <option value="Food">Mess Included</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1 font-medium">Google Maps URL (Method A)</label>
                            <input type="url" id="formMap" required placeholder="Paste shared Google maps pin link here" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1 font-medium">Contact Number</label>
                            <input type="tel" id="formPhone" required placeholder="Enter 10 digit mobile number" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                        </div>
                        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center space-x-1.5 mt-2 shadow-lg shadow-emerald-500/20">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span>Publish Live Sandbox</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Owner Listings Workspace -->
            <div class="lg:col-span-2 space-y-4">
                <div>
                    <h2 class="text-xl font-bold text-white flex items-center space-x-2">
                        <i class="fa-solid fa-folder-open text-blue-400"></i>
                        <span>Your Created Listings</span>
                    </h2>
                    <p class="text-xs text-gray-400 mt-0.5">Control live dynamic entries from local runtime space below.</p>
                </div>
                <div id="ownerGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Owner list rendering -->
                </div>
            </div>
        </div>

    </main>

    <!-- ================= JAVASCRIPT ARCHITECTURE ================= -->
    <script>
        // Core Static Database With Authentic Real Student Room Images URLs
        let roomsData = [
            {
                id: 1,
                title: "Premium Self-Study Single PG",
                rent: 5500,
                type: "Single",
                images: [
                    "https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcSPaMb3Rw_vmkd4JrvxvgVqsL0HaYVn40RgkIPe5W_YS_V9xP6lZmK82IplgUB3LAwFYoXnFVqcfAwHnao",
                    "https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcRF87M_6aD71P2ubFwSI3WaeS3O3cP_bZJnBcqTzS0Cd_Qw1F2OQUAXwmx73BZ_p_cyF0B88emH5pNifdA"
                ],
                currentImgIndex: 0,
                mapUrl: "https://maps.google.com/?q=Kota+Rajasthan+Student+Area",
                phone: "9876543210"
            },
            {
                id: 2,
                title: "Shanti Niwas Boys Hostel Layout",
                rent: 4200,
                type: "Library",
                images: [
                    "https://encrypted-tbn1.gstatic.com/licensed-image?q=tbn:ANd9GcTluYfpYgHX13iybOigJ9pNJAZr6n5JbrlGks3d5Oa0R_ymzqf-RigfgLi46YFY2_IYSlGNldtj0xIGBKE",
                    "https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcSPaMb3Rw_vmkd4JrvxvgVqsL0HaYVn40RgkIPe5W_YS_V9xP6lZmK82IplgUB3LAwFYoXnFVqcfAwHnao"
                ],
                currentImgIndex: 0,
                mapUrl: "https://maps.google.com/?q=Allen+Sankalp+Campus+Kota",
                phone: "9112233445"
            },
            {
                id: 3,
                title: "Standard Room with Mess Plan",
                rent: 6000,
                type: "Food",
                images: [
                    "https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcRF87M_6aD71P2ubFwSI3WaeS3O3cP_bZJnBcqTzS0Cd_Qw1F2OQUAXwmx73BZ_p_cyF0B88emH5pNifdA",
                    "https://encrypted-tbn1.gstatic.com/licensed-image?q=tbn:ANd9GcTluYfpYgHX13iybOigJ9pNJAZr6n5JbrlGks3d5Oa0R_ymzqf-RigfgLi46YFY2_IYSlGNldtj0xIGBKE"
                ],
                currentImgIndex: 0,
                mapUrl: "https://maps.google.com/?q=Indra+Vihar+Kota",
                phone: "8887776665"
            }
        ];

        let currentRole = null;
        let selectedFilter = 'all';

        // Role Lifecycle Controls
        function setRole(role) {
            currentRole = role;
            document.getElementById('roleModal').classList.add('hidden');
            
            const badge = document.getElementById('roleBadge');
            const switchBtnText = document.getElementById('switchBtnText');
            
            if(role === 'tenant') {
                badge.innerText = "Student Mode";
                badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider bg-blue-500/10 text-blue-400 border border-blue-500/20";
                switchBtnText.innerText = "Switch to Owner Portal";
                document.getElementById('tenantView').classList.remove('hidden');
                document.getElementById('ownerView').classList.add('hidden');
                renderTenantGrid();
            } else {
                badge.innerText = "Owner Portal";
                badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                switchBtnText.innerText = "Switch to Student View";
                document.getElementById('tenantView').classList.add('hidden');
                document.getElementById('ownerView').classList.remove('hidden');
                renderOwnerGrid();
            }
        }

        function toggleRole() {
            if(currentRole === 'tenant') setRole('owner');
            else setRole('tenant');
        }

        function resetApp() {
            document.getElementById('roleModal').classList.remove('hidden');
            document.getElementById('tenantView').classList.add('hidden');
            document.getElementById('ownerView').classList.add('hidden');
        }

        // Horizontal Image Carousel Toggler Logic
        function changeImage(roomId, direction, event) {
            event.stopPropagation();
            const room = roomsData.find(r => r.id === roomId);
            if (room) {
                room.currentImgIndex = (room.currentImgIndex + direction + room.images.length) % room.images.length;
                
                // Update Image source and dot indicators in UI
                document.getElementById(`img-${roomId}`).src = room.images[room.currentImgIndex];
                const dots = document.querySelectorAll(`.dot-${roomId}`);
                dots.forEach((dot, idx) => {
                    if(idx === room.currentImgIndex) {
                        dot.classList.remove('bg-gray-500/50');
                        dot.classList.add('bg-white');
                    } else {
                        dot.classList.remove('bg-white');
                        dot.classList.add('bg-gray-500/50');
                    }
                });
            }
        }

        // Copy System URL / Quick Native Sharing Simulation
        function shareProperty(title, rent) {
            const tempUrl = window.location.href;
            navigator.clipboard.writeText(`Hey! Check out this room on Zonix: ${title} at just ₹${rent}/month! Link: ${tempUrl}`);
            alert("🚀 Property details with link copied to clipboard! Share it anywhere.");
        }

        // Tenant UI Core Renderer
        function renderTenantGrid(filteredList = roomsData) {
            const container = document.getElementById('propertyGrid');
            container.innerHTML = '';

            if(filteredList.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 glass rounded-2xl border-dashed border-gray-800">
                        <i class="fa-solid fa-folder-minus text-4xl text-gray-600 mb-2"></i>
                        <p class="text-sm text-gray-400">No rooms matching this query found.</p>
                    </div>`;
                return;
            }

            filteredList.forEach(room => {
                let dotIndicators = room.images.map((_, idx) => `
                    <span class="dot-${room.id} w-1.5 h-1.5 rounded-full transition-all ${idx === room.currentImgIndex ? 'bg-white' : 'bg-gray-500/50'}"></span>
                `).join('');

                container.innerHTML += `
                    <div class="glass rounded-2xl overflow-hidden transition duration-300 hover:border-gray-700/80 group">
                        <!-- Multi-Image Slider Container -->
                        <div class="relative h-48 w-full bg-gray-900 overflow-hidden">
                            <img id="img-${room.id}" src="${room.images[room.currentImgIndex]}" alt="Room view" class="w-full h-full object-cover group-hover:scale-[1.03] transition duration-500">
                            
                            <!-- Carousel Controls (Only show if multiple images available) -->
                            ${room.images.length > 1 ? `
                                <button onclick="changeImage(${room.id}, -1, event)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/80 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs transition">
                                    <i class="fa-solid fa-chevron-left"></i>
                                </button>
                                <button onclick="changeImage(${room.id}, 1, event)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/80 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs transition">
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                            ` : ''}

                            <!-- Dot Tracking Indicators Overlay -->
                            <div class="absolute bottom-3 left-1/2 -translate-y-1/2 flex items-center space-x-1 bg-black/40 px-2 py-1 rounded-full">
                                ${dotIndicators}
                            </div>

                            <span class="absolute top-3 right-3 text-[10px] font-bold px-2.5 py-1 rounded-lg bg-black/70 border border-white/10 backdrop-blur-md uppercase tracking-wide text-blue-400">
                                ${room.type === 'Single' ? '🟢 Single' : room.type === 'Library' ? '📚 Library' : '🍲 Food Included'}
                            </span>
                        </div>

                        <!-- Card Metadata Content Info -->
                        <div class="p-5 space-y-4">
                            <div>
                                <h3 class="font-bold text-base text-gray-100 line-clamp-1">${room.title}</h3>
                                <div class="flex items-baseline space-x-1 mt-1">
                                    <span class="text-xl font-black text-blue-400">₹${room.rent}</span>
                                    <span class="text-xs text-gray-500">/ month</span>
                                </div>
                            </div>

                            <!-- Method A Google Maps & Share Bar Layout -->
                            <div class="flex items-center justify-between border-t border-b border-gray-800/60 py-2.5 text-xs">
                                <a href="${room.mapUrl}" target="_blank" class="text-gray-400 hover:text-blue-400 flex items-center space-x-1 transition font-medium">
                                    <i class="fa-solid fa-location-dot text-red-400"></i>
                                    <span>View Map Location</span>
                                </a>
                                <button onclick="shareProperty('${room.title}', ${room.rent})" class="text-gray-500 hover:text-gray-300 p-1 transition" title="Copy Share Link">
                                    <i class="fa-solid fa-share-nodes"></i>
                                </button>
                            </div>

                            <!-- CTA Communications Layout -->
                            <div class="grid grid-cols-2 gap-2 text-xs font-bold">
                                <a href="tel:${room.phone}" class="w-full bg-gray-800 hover:bg-gray-700/80 text-gray-200 py-2.5 rounded-xl text-center flex items-center justify-center space-x-1.5 transition">
                                    <i class="fa-solid fa-phone text-xs text-blue-400"></i>
                                    <span>Call Owner</span>
                                </a>
                                <a href="https://wa.me/91${room.phone}?text=Hi,%20I'm%20interested%20in%20your%20Zonix%20listing:%20${encodeURIComponent(room.title)}" target="_blank" class="w-full bg-emerald-600/10 hover:bg-emerald-600 text-emerald-400 hover:text-white py-2.5 rounded-xl text-center flex items-center justify-center space-x-1.5 transition border border-emerald-500/20 group">
                                    <i class="fa-brands fa-whatsapp text-sm text-emerald-400 group-hover:text-white"></i>
                                    <span>WhatsApp</span>
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // Owner UI Management Sandbox Renderer
        function renderOwnerGrid() {
            const container = document.getElementById('ownerGrid');
            container.innerHTML = '';

            const ownerItems = roomsData.filter(r => r.isCustomOwnerItem === true || r.id <= 3);

            ownerItems.forEach(room => {
                container.innerHTML += `
                    <div class="glass p-4 rounded-xl flex items-center justify-between border-gray-800 text-xs">
                        <div class="flex items-center space-x-3">
                            <img src="${room.images[0]}" class="w-12 h-12 rounded-lg object-cover bg-gray-800">
                            <div>
                                <h4 class="font-bold text-gray-200 line-clamp-1">${room.title}</h4>
                                <p class="text-gray-400 mt-0.5">Rent: <span class="text-emerald-400 font-semibold">₹${room.rent}</span> | Type: ${room.type}</p>
                            </div>
                        </div>
                        <button onclick="deleteRoom(${room.id})" class="text-gray-600 hover:text-red-400 p-2 transition">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>`;
            });
        }

        // Dynamic Runtime Actions (Form Submission & Deletion)
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const title = document.getElementById('formTitle').value;
            const rent = parseInt(document.getElementById('formRent').value);
            const type = document.getElementById('formType').value;
            const mapUrl = document.getElementById('formMap').value;
            const phone = document.getElementById('formPhone').value;

            // Injecting fallback placeholder design layout along with real demo template configuration data
            const newRoom = {
                id: Date.now(),
                title: title,
                rent: rent,
                type: type,
                images: [
                    "https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcRF87M_6aD71P2ubFwSI3WaeS3O3cP_bZJnBcqTzS0Cd_Qw1F2OQUAXwmx73BZ_p_cyF0B88emH5pNifdA",
                    "https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcSPaMb3Rw_vmkd4JrvxvgVqsL0HaYVn40RgkIPe5W_YS_V9xP6lZmK82IplgUB3LAwFYoXnFVqcfAwHnao"
                ],
                currentImgIndex: 0,
                mapUrl: mapUrl,
                phone: phone,
                isCustomOwnerItem: true
            };

            roomsData.unshift(newRoom);
            document.getElementById('listingForm').reset();
            
            // Pop Confetti Celebration Architecture
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#10b981', '#3b82f6'] });
            
            renderOwnerGrid();
            alert("🎉 Awesome! Your property listing is added to the temporary runtime sandbox. Switch to Student Mode to see it live!");
        }

        function deleteRoom(id) {
            if(confirm("Are you sure you want to delete this listing structure from the active view state?")) {
                roomsData = roomsData.filter(r => r.id !== id);
                renderOwnerGrid();
            }
        }

        // Filter Logic Engines
        function filterType(type) {
            selectedFilter = type;
            document.querySelectorAll('.chip-btn').forEach(btn => {
                btn.classList.remove('border-blue-500/30', 'text-blue-400');
                btn.classList.add('text-gray-400');
            });
            document.getElementById(`chip-${type}`).classList.add('border-blue-500/30', 'text-blue-400');
            applyCombinedFilters();
        }

        function filterRooms() {
            applyCombinedFilters();
        }

        function applyCombinedFilters() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            let result = roomsData;

            if(selectedFilter !== 'all') {
                result = result.filter(r => r.type === selectedFilter);
            }

            if(query.trim() !== '') {
                result = result.filter(r => 
                    r.title.toLowerCase().includes(query) || 
                    r.type.toLowerCase().includes(query)
                );
            }

            renderTenantGrid(result);
        }
    </script>
</body>
</html>
