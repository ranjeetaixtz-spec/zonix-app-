<!-- Add this block inside the Owner Form (between Title and Rent inputs) -->
<div class="p-3 bg-blue-900/20 rounded-xl border border-blue-800/50 space-y-2">
    <span class="block text-[11px] font-bold text-blue-400 uppercase tracking-wider mb-1">
        <i class="fa-solid fa-map-location-dot mr-1"></i>Google Maps Auto-Sync
    </span>
    <input type="url" id="mapsLink" placeholder="Paste Hostel Google Maps Link here..." 
           class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 text-gray-300 text-[11px]">
    <button type="button" onclick="syncFromMaps()" class="text-[10px] bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg w-full font-bold">
        Fetch Real-Time Data from Maps
    </button>
</div>

<!-- Add this JS function in the Script tag -->
<script>
    function syncFromMaps() {
        const link = document.getElementById('mapsLink').value;
        if (!link.includes('maps.app.goo.gl') && !link.includes('google.com/maps')) {
            alert("⚠️ Please provide a valid Google Maps link!");
            return;
        }
        // Simulation of API fetch: In a real project, this would hit the Google Places API
        alert("🔍 Syncing with Google Maps database... \n\nSuccessfully retrieved: Verified Coordinates, Locality Data, and User Ratings!");
        
        // Auto-filling fields based on the mock sync
        document.getElementById('formTitle').value = "Navodaya Boys Hostel (Verified via Maps)";
        document.getElementById('formLandmark').value = "Near Main Coaching Hub";
    }
</script>
