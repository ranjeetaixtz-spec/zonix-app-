<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonix - End-to-End Student Housing</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="roleModal" class="fixed inset-0 z-50 flex items-center justify-center bg-[#070a12] px-4">
        <div class="max-w-md w-full text-center space-y-8">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">ZONIX</h1>
                <p class="text-gray-400 mt-2 text-sm">Find your perfect study bubble or list your space instantly.</p>
            </div>
            
            <div class="space-y-4">
                <button onclick="setRole('tenant')" class="w-full glass hover:border-blue-500/50 p-6 rounded-2xl flex items-center space-x-4 transition-all duration-300 text-left group hover:scale-[1.02]">
                    <div class="p-4 bg-blue-500/10 rounded-xl text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-all">
                        <i class="fa-solid fa-graduation-cap text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white">I want to Rent a Room</h3>
                        <p class="text-xs text-gray-400 mt-0.5">Search PGs, hostels, and visit slots near you.</p>
                    </div>
                </button>

                <button onclick="setRole('owner')" class="w-full glass hover:border-emerald-500/50 p-6 rounded-2xl flex items-center space-x-4 transition-all duration-300 text-left group hover:scale-[1.02]">
                    <div class="p-4 bg-emerald-500/10 rounded-xl text-emerald-400 group-hover:bg-emerald-500 group-hover:text-white transition-all">
                        <i class="fa-solid fa-house-user text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white">I want to List Property</h3>
                        <p class="text-xs text-gray-400 mt-0.5">Post rooms, set meeting hours, manage edits.</p>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 z-40 glass border-b border-gray-800/60 px-4 py-3 mb-6">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="resetApp()">
                <span class="text-2xl font-black tracking-wider text-blue-500">ZONIX</span>
                <span id="roleBadge" class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider"></span>
            </div>
            <button onclick="toggleRole()" class="text-xs font-semibold bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-xl flex items-center space-x-1.5 transition">
                <i class="fa-solid fa-shuffle text-blue-400"></i>
                <span id="switchBtnText">Switch Mode</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        
        <div id="tenantView" class="hidden space-y-6">
            <div class="space-y-3">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" id="searchBox" oninput="filterRooms()" placeholder="Search by area, landmark or facility..." class="w-full glass pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition text-sm text-gray-200">
                </div>
                <div class="flex items-center space-x-2 overflow-x-auto hide-scrollbar py-1 text-xs">
                    <button onclick="filterType('all')" class="chip-btn px-4 py-2 rounded-full glass border-blue-500/30 text-blue-400 font-medium whitespace-nowrap" id="chip-all">All Hubs</button>
                    <button onclick="filterType('Single')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-Single">🟢 Single Room</button>
                    <button onclick="filterType('Library')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-Library">📚 Library Attached</button>
                    <button onclick="filterType('Food')" class="chip-btn px-4 py-2 rounded-full glass text-gray-400 whitespace-nowrap" id="chip-Food">🍲 Mess Included</button>
                </div>
            </div>

            <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="ownerView" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-6 rounded-2xl border-emerald-500/10 space-y-4">
                    <div>
                        <h2 id="formHeaderTitle" class="text-xl font-bold text-white flex items-center space-x-2">
                            <i class="fa-solid fa-circle-plus text-emerald-400"></i>
                            <span>List New Space</span>
                        </h2>
                        <p class="text-xs text-gray-400 mt-0.5">Fill details or update current listings seamlessly.</p>
                    </div>

                    <form id="listingForm" onsubmit="handleFormSubmit(event)" class="space-y-3 text-xs">
                        <input type="hidden" id="formEditId" value="">
                        <div>
                            <label class="block text-gray-400 mb-1 font-medium">Property Name / Title</label>
                            <input type="text" id="formTitle" required placeholder="e.g., Radha Krishna PG Single" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-gray-400 mb-1 font-medium">Monthly Rent (₹)</label>
                                <input type="number" id="formRent" required placeholder="4500" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                            </div>
                            <div>
                                <label class="block text-gray-400 mb-1 font-medium">Property Type</label>
                                <select id="formType" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-300">
                                    <option value="Single">Single Room</option>
                                    <option value="Library">Library Attached</option>
                                    <option value="Food">Mess Included</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1 font-medium">Open Visiting Slots (When can student meet?)</label>
                            <select id="formTimeSlot" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-300">
                                <option value="10:00 AM - 01:00 PM">Morning (10:00 AM - 01:00 PM)</option>
                                <option value="04:00 PM - 08:00 PM">Evening (04:00 PM - 08:00 PM)</option>
                                <option value="11:00 AM - 06:00 PM">Full Day (11:00 AM - 06:00 PM)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1 font-medium">Google Maps Pin Link (Method A)</label>
                            <input type="url" id="formMap" required placeholder="Paste maps share URL" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1 font-medium">Contact WhatsApp Number</label>
                            <input type="tel" id="formPhone" required placeholder="10-digit number without +91" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl p-3 focus:outline-none focus:border-emerald-500 text-gray-200">
                        </div>
                        <button type="submit" id="formSubmitBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center space-x-1.5 mt-2">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span>Publish Live Sandbox</span>
                        </button>
                        <button type="button" id="cancelEditBtn" onclick="resetFormState()" class="w-full hidden bg-gray-800 hover:bg-gray-700 text-gray-400 font-semibold py-2 rounded-xl transition text-center">
                            Cancel Edit
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div>
                    <h2 class="text-xl font-bold text-white flex items-center space-x-2">
                        <i class="fa-solid fa-folder-open text-blue-400"></i>
                        <span>Your Active Dashboard Listings</span>
                    </h2>
                </div>
                <div id="ownerGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <div id="bookingModal" class="fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm hidden">
        <div class="glass w-full max-w-md rounded-2xl p-6 border border-gray-800 space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-white flex items-center space-x-2">
                    <i class="fa-solid fa-calendar-check text-blue-400"></i>
                    <span>Schedule Free Visit</span>
                </h3>
                <button onclick="closeBookingModal()" class="text-gray-500 hover:text-white transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="modalBookingForm" onsubmit="executeBookingRequest(event)" class="space-y-3 text-xs">
                <input type="hidden" id="modalRoomId" value="">
                <div>
                    <label class="block text-gray-400 mb-1">Your Full Name</label>
                    <input type="text" id="tenantName" required placeholder="Enter name" class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 focus:border-blue-500 text-gray-200 outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Your Mobile Number</label>
                    <input type="tel" id="tenantPhone" required placeholder="Enter mobile" class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 focus:border-blue-500 text-gray-200 outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Select Meet Timing (Based on Owner Availability)</label>
                    <select id="tenantTimeSelection" required class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 focus:border-blue-500 text-gray-300 outline-none">
                        </select>
                </div>
                <div class="p-3 bg-blue-500/5 border border-blue-500/10 rounded-xl text-[11px] text-gray-400">
                    ℹ️ Clicking below auto-generates a pre-filled matching profile slip over WhatsApp to the landlord.
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition">
                    Confirm & Send Profile Slip
                </button>
            </form>
        </div>
    </div>

    <script>
        let roomsData = [
            { id: 1, title: "Premium Self-Study Single PG (Kota)", rent: 5500, type: "Single", timeSlot: "04:00 PM - 08:00 PM", images: ["https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcSPaMb3Rw_vmkd4JrvxvgVqsL0HaYVn40RgkIPe5W_YS_V9xP6lZmK82IplgUB3LAwFYoXnFVqcfAwHnao"], currentImgIndex: 0, mapUrl: "https://maps.google.com", phone: "9876543210" },
            { id: 2, title: "Shanti Niwas Boys Hostel (Indore)", rent: 4200, type: "Library", timeSlot: "10:00 AM - 01:00 PM", images: ["https://encrypted-tbn1.gstatic.com/licensed-image?q=tbn:ANd9GcTluYfpYgHX13iybOigJ9pNJAZr6n5JbrlGks3d5Oa0R_ymzqf-RigfgLi46YFY2_IYSlGNldtj0xIGBKE"], currentImgIndex: 0, mapUrl: "https://maps.google.com", phone: "9112233445" }
        ];

        let currentRole = null;
        let selectedFilter = 'all';

        function setRole(role) {
            currentRole = role;
            document.getElementById('roleModal').classList.add('hidden');
            const badge = document.getElementById('roleBadge');
            const switchBtnText = document.getElementById('switchBtnText');
            
            if(role === 'tenant') {
                badge.innerText = "Student Mode";
                badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-blue-500/10 text-blue-400 border border-blue-500/20";
                switchBtnText.innerText = "Switch to Owner Portal";
                document.getElementById('tenantView').classList.remove('hidden');
                document.getElementById('ownerView').classList.add('hidden');
                renderTenantGrid();
            } else {
                badge.innerText = "Owner Portal";
                badge.className = "text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                switchBtnText.innerText = "Switch to Student View";
                document.getElementById('tenantView').classList.add('hidden');
                document.getElementById('ownerView').classList.remove('hidden');
                renderOwnerGrid();
            }
        }

        function toggleRole() {
            setRole(currentRole === 'tenant' ? 'owner' : 'tenant');
        }

        function resetApp() {
            document.getElementById('roleModal').classList.remove('hidden');
        }

        // Tenant Grid Renderer
        function renderTenantGrid(filteredList = roomsData) {
            const container = document.getElementById('propertyGrid');
            container.innerHTML = '';

            filteredList.forEach(room => {
                container.innerHTML += `
                    <div class="glass rounded-2xl overflow-hidden group border-gray-800/80">
                        <div class="relative h-48 w-full bg-gray-900">
                            <img src="${room.images[0]}" class="w-full h-full object-cover">
                            <span class="absolute top-3 right-3 text-[10px] font-bold px-2 py-1 rounded bg-black/70 text-blue-400 border border-white/10">
                                🏠 ${room.type}
                            </span>
                        </div>
                        <div class="p-5 space-y-3">
                            <div>
                                <h3 class="font-bold text-base text-gray-100 line-clamp-1">${room.title}</h3>
                                <p class="text-xl font-black text-blue-400 mt-0.5">₹${room.rent}<span class="text-xs font-normal text-gray-500">/mo</span></p>
                                <p class="text-[11px] text-gray-400 mt-1"><i class="fa-solid fa-clock text-blue-400/70 mr-1"></i>Visits Open: ${room.timeSlot}</p>
                            </div>
                            <div class="flex items-center justify-between border-t border-b border-gray-800/40 py-2 text-xs">
                                <a href="${room.mapUrl}" target="_blank" class="text-gray-400 hover:text-blue-400 flex items-center space-x-1"><i class="fa-solid fa-location-dot text-red-400"></i> <span>Open Maps Location</span></a>
                                <button onclick="shareProperty('${room.title}', ${room.rent})" class="text-gray-500 hover:text-gray-300"><i class="fa-solid fa-share-nodes"></i></button>
                            </div>
                            <button onclick="openBookingModal(${room.id})" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition text-xs">
                                <i class="fa-solid fa-calendar-check mr-1.5"></i>Book Free Visit Appointment
                            </button>
                        </div>
                    </div>`;
            });
        }

        // Owner View Control Workspace Grid
        function renderOwnerGrid() {
            const container = document.getElementById('ownerGrid');
            container.innerHTML = '';
            roomsData.forEach(room => {
                container.innerHTML += `
                    <div class="glass p-4 rounded-xl flex items-center justify-between text-xs">
                        <div class="flex items-center space-x-3">
                            <img src="${room.images[0]}" class="w-12 h-12 rounded-lg object-cover">
                            <div>
                                <h4 class="font-bold text-gray-200 line-clamp-1">${room.title}</h4>
                                <p class="text-gray-400 mt-0.5">Rent: <span class="text-emerald-400">₹${room.rent}</span> | ${room.type}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-1">
                            <button onclick="populateFormForEdit(${room.id})" class="text-gray-400 hover:text-blue-400 p-2 transition" title="Edit Parameters"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteRoom(${room.id})" class="text-gray-500 hover:text-red-400 p-2 transition"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
            });
        }

        // Edit Data Injector Engine
        function populateFormForEdit(id) {
            const room = roomsData.find(r => r.id === id);
            if(!room) return;

            document.getElementById('formEditId').value = room.id;
            document.getElementById('formTitle').value = room.title;
            document.getElementById('formRent').value = room.rent;
            document.getElementById('formType').value = room.type;
            document.getElementById('formTimeSlot').value = room.timeSlot;
            document.getElementById('formMap').value = room.mapUrl;
            document.getElementById('formPhone').value = room.phone;

            // UI Label states transform
            document.getElementById('formHeaderTitle').innerHTML = `<i class="fa-solid fa-pen-to-square text-blue-400"></i><span>Update Listing</span>`;
            document.getElementById('formSubmitBtn').className = "w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition mt-2";
            document.getElementById('formSubmitBtn').innerText = "Apply Modified Changes";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
        }

        function resetFormState() {
            document.getElementById('listingForm').reset();
            document.getElementById('formEditId').value = "";
            document.getElementById('formHeaderTitle').innerHTML = `<i class="fa-solid fa-circle-plus text-emerald-400"></i><span>List New Space</span>`;
            document.getElementById('formSubmitBtn').className = "w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition mt-2";
            document.getElementById('formSubmitBtn').innerText = "Publish Live Sandbox";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const editId = document.getElementById('formEditId').value;

            const title = document.getElementById('formTitle').value;
            const rent = parseInt(document.getElementById('formRent').value);
            const type = document.getElementById('formType').value;
            const timeSlot = document.getElementById('formTimeSlot').value;
            const mapUrl = document.getElementById('formMap').value;
            const phone = document.getElementById('formPhone').value;

            if(editId) {
                // Modify block runtime
                const roomIndex = roomsData.findIndex(r => r.id == editId);
                if(roomIndex !== -1) {
                    roomsData[roomIndex] = { ...roomsData[roomIndex], title, rent, type, timeSlot, mapUrl, phone };
                }
                resetFormState();
                confetti({ particleCount: 50, colors: ['#3b82f6'] });
                alert("✏️ Listing edited and modified successfully!");
            } else {
                // Add fresh runtime structural nodes
                const newRoom = { id: Date.now(), title, rent, type, timeSlot, mapUrl, phone, images: ["https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcRF87M_6aD71P2ubFwSI3WaeS3O3cP_bZJnBcqTzS0Cd_Qw1F2OQUAXwmx73BZ_p_cyF0B88emH5pNifdA"] };
                roomsData.unshift(newRoom);
                confetti({ particleCount: 100, spread: 70 });
                alert("🎉 Live Sandbox added successfully!");
                document.getElementById('listingForm').reset();
            }
            renderOwnerGrid();
        }

        // Modal Interactive Slot Computations
        function openBookingModal(roomId) {
            const room = roomsData.find(r => r.id === roomId);
            if(!room) return;

            document.getElementById('modalRoomId').value = roomId;
            const selectEl = document.getElementById('tenantTimeSelection');
            selectEl.innerHTML = '';

            // Split and generate clean custom intervals dynamically
            let option = document.createElement('option');
            option.value = room.timeSlot;
            option.innerText = `Preferred Time Inside Window (${room.timeSlot})`;
            selectEl.appendChild(option);

            document.getElementById('bookingModal').classList.remove('hidden');
        }

        function closeBookingModal() {
            document.getElementById('bookingModal').classList.add('hidden');
            document.getElementById('modalBookingForm').reset();
        }

        // WhatsApp Custom Core Dynamic Payload Generation Block
        function executeBookingRequest(e) {
            e.preventDefault();
            const roomId = document.getElementById('modalRoomId').value;
            const name = document.getElementById('tenantName').value;
            const pPhone = document.getElementById('tenantPhone').value;
            const chosenTime = document.getElementById('tenantTimeSelection').value;

            const room = roomsData.find(r => r.id == roomId);
            if(!room) return;

            const message = `Ram Ram ji! Mera naam ${name} hai. Maine aapka room "${room.title}" Zonix par dekha tha. Main aapse milne aur space dekhne unke rules ke mutabik approx [ ${chosenTime} ] baje aa raha hoon. Mera active number: ${pPhone} hai. Please booking request confirm karein!`;
            
            const waLink = `https://wa.me/91${room.phone}?text=${encodeURIComponent(message)}`;
            window.open(waLink, '_blank');
            closeBookingModal();
        }

        function deleteRoom(id) {
            if(confirm("Delete this listing?")) {
                roomsData = roomsData.filter(r => r.id !== id);
                renderOwnerGrid();
            }
        }

        function shareProperty(t, r) {
            navigator.clipboard.writeText(`Check this on Zonix: ${t} @ ₹${r}/mo! Link: ${window.location.href}`);
            alert("Copied share string!");
        }

        function filterType(type) {
            selectedFilter = type;
            document.querySelectorAll('.chip-btn').forEach(b => b.classList.replace('text-blue-400','text-gray-400'));
            applyCombinedFilters();
        }

        function filterRooms() { applyCombinedFilters(); }

        function applyCombinedFilters() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            let res = roomsData;
            if(selectedFilter !== 'all') res = res.filter(r => r.type === selectedFilter);
            if(q.trim() !== '') res = res.filter(r => r.title.toLowerCase().includes(q));
            renderTenantGrid(res);
        }
    </script>
</body>
</html>
