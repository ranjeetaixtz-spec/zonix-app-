<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonix - Premium Room Rentals in India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'zonix-blue': '#0A2540',
                        'zonix-charcoal': '#2D3748',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .filter-chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .filter-chip:hover {
            transform: translateY(-2px);
        }
        
        .filter-chip.active {
            background-color: #0A2540;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(10, 37, 64, 0.3);
        }
        
        .property-card {
            transition: all 0.3s ease;
        }
        
        .property-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }
        
        .modal {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.show {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: #10B981;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            background: #F0F4F8;
            color: #0A2540;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-white text-zonix-charcoal">
    
    <!-- Fixed Header -->
    <header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-zonix-blue tracking-tight">Zonix</h1>
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-zonix-blue to-blue-700 flex items-center justify-center cursor-pointer">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            
            <!-- Purpose Section -->
            <section class="mb-16">
                <div class="text-center mb-12">
                    <h2 class="text-3xl md:text-4xl font-semibold text-zonix-blue mb-3 tracking-tight">Find a Room Based on Your Purpose</h2>
                    <p class="text-gray-500 text-sm md:text-base max-w-xl mx-auto">Select your primary need to discover perfectly matched accommodations</p>
                </div>
                
                <div class="flex flex-col md:flex-row gap-4 justify-center max-w-4xl mx-auto">
                    <button onclick="filterProperties('Study')" class="filter-chip active px-10 py-6 rounded-2xl border-2 border-gray-200 bg-white font-semibold text-lg hover:border-zonix-blue focus:outline-none" data-purpose="Study">
                        <div class="flex flex-col items-center gap-2">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                            <span>Study</span>
                        </div>
                    </button>
                    
                    <button onclick="filterProperties('Job')" class="filter-chip px-10 py-6 rounded-2xl border-2 border-gray-200 bg-white font-semibold text-lg hover:border-zonix-blue focus:outline-none" data-purpose="Job">
                        <div class="flex flex-col items-center gap-2">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                            <span>Job</span>
                        </div>
                    </button>
                    
                    <button onclick="filterProperties('Business')" class="filter-chip px-10 py-6 rounded-2xl border-2 border-gray-200 bg-white font-semibold text-lg hover:border-zonix-blue focus:outline-none" data-purpose="Business">
                        <div class="flex flex-col items-center gap-2">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                            </svg>
                            <span>Business</span>
                        </div>
                    </button>
                </div>
            </section>

            <!-- Property Listings -->
            <section>
                <div class="mb-8">
                    <h3 class="text-2xl font-semibold text-zonix-blue mb-2">Available Properties</h3>
                    <p class="text-gray-500 text-sm">Curated spaces designed for <span id="currentPurpose" class="font-semibold text-zonix-blue">Study</span></p>
                </div>
                
                <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Properties will be injected here by JavaScript -->
                </div>
            </section>

        </div>
    </main>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal fixed inset-0 bg-black/50 backdrop-blur-sm z-50 items-center justify-center px-6">
        <div class="modal-content bg-white rounded-3xl p-8 max-w-md w-full relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            
            <h3 class="text-2xl font-bold text-zonix-blue mb-2">Book Your Stay</h3>
            <p class="text-gray-500 text-sm mb-6">Fill in your details to send a free booking request</p>
            
            <form id="bookingForm" onsubmit="submitBooking(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-zonix-charcoal mb-2">Your Name</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-zonix-blue focus:outline-none transition" placeholder="Enter your full name">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-zonix-charcoal mb-2">Mobile Number</label>
                    <input type="tel" required pattern="[0-9]{10}" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-zonix-blue focus:outline-none transition" placeholder="10-digit mobile number">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-zonix-charcoal mb-2">Confirm Purpose</label>
                    <select required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-zonix-blue focus:outline-none transition bg-white">
                        <option value="">Select your purpose</option>
                        <option value="Study">Study</option>
                        <option value="Job">Job</option>
                        <option value="Business">Business</option>
                    </select>
                </div>
                
                <input type="hidden" id="selectedProperty" name="property">
                
                <button type="submit" class="w-full bg-zonix-blue text-white py-4 rounded-xl font-semibold text-lg hover:bg-blue-900 transition mt-6">
                    Confirm Booking Request
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <div class="flex items-center gap-3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <span class="font-semibold">Request sent to Landlord successfully!</span>
        </div>
    </div>

    <script>
        // Property Data
        const properties = [
            {
                id: 1,
                image: 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=800&q=80',
                rent: '6,500',
                location: 'Kota, Rajasthan',
                purpose: 'Study',
                tags: ['24x7 Power Backup', 'Near Coaching Hub', 'Study Room']
            },
            {
                id: 2,
                image: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800&q=80',
                rent: '8,200',
                location: 'Connaught Place, Delhi',
                purpose: 'Job',
                tags: ['Near Metro Station', 'High-Speed Wi-Fi', 'AC Room']
            },
            {
                id: 3,
                image: 'https://images.unsplash.com/photo-1554995207-c18c203602cb?w=800&q=80',
                rent: '5,800',
                location: 'Varanasi, UP',
                purpose: 'Study',
                tags: ['Quiet Environment', '24x7 Power Backup', 'Library Access']
            },
            {
                id: 4,
                image: 'https://images.unsplash.com/photo-1536376072261-38c75010e6c9?w=800&q=80',
                rent: '12,500',
                location: 'Whitefield, Bangalore',
                purpose: 'Job',
                tags: ['Near Metro Station', 'High-Speed Wi-Fi', 'Gym Access']
            },
            {
                id: 5,
                image: 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=800&q=80',
                rent: '15,000',
                location: 'Bandra West, Mumbai',
                purpose: 'Business',
                tags: ['Meeting Room', 'High-Speed Wi-Fi', 'Premium Location']
            }
        ];

        let currentFilter = 'Study';

        // Filter Properties
        function filterProperties(purpose) {
            currentFilter = purpose;
            
            // Update active state on chips
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            event.target.closest('.filter-chip').classList.add('active');
            
            // Update current purpose text
            document.getElementById('currentPurpose').textContent = purpose;
            
            // Render filtered properties
            renderProperties();
        }

        // Render Properties
        function renderProperties() {
            const grid = document.getElementById('propertyGrid');
            const filtered = properties.filter(p => p.purpose === currentFilter);
            
            grid.innerHTML = filtered.map(property => `
                <div class="property-card bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm">
                    <div class="h-56 overflow-hidden">
                        <img src="${property.image}" alt="${property.location}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="text-xl font-bold text-zonix-blue mb-1">₹${property.rent}<span class="text-sm font-normal text-gray-500">/month</span></h4>
                                <p class="text-gray-600 text-sm">${property.location}</p>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-5">
                            ${property.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <button onclick="openModal(${property.id})" class="w-full bg-zonix-blue text-white py-3 rounded-xl font-semibold hover:bg-blue-900 transition">
                            Send Free Booking Request
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Modal Functions
        function openModal(propertyId) {
            document.getElementById('selectedProperty').value = propertyId;
            document.getElementById('bookingModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('bookingModal').classList.remove('show');
            document.body.style.overflow = 'auto';
            document.getElementById('bookingForm').reset();
        }

        // Submit Booking
        function submitBooking(event) {
            event.preventDefault();
            
            // Close modal
            closeModal();
            
            // Show toast
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            
            // Hide toast after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Close modal on backdrop click
        document.getElementById('bookingModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initial render
        renderProperties();
    </script>

</body>
</html>
